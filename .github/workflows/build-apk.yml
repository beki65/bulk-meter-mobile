name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest  # macOS often has better Android SDK support
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        env:
          CI: false
          
      - name: Build React App
        run: npm run build
        env:
          CI: false
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Capacitor
        run: |
          npm install @capacitor/cli @capacitor/android
          npx cap init "Bulk Meter" "com.beki65.bulkmeter" --web-dir=build
          npx cap add android
          npx cap copy android
          
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Bulk-Meter-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
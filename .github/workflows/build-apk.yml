name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          
      - name: Install dependencies
        run: npm ci
        env:
          CI: false
          
      - name: Build
        run: npm run build
        env:
          CI: false
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'
          
      - name: Setup Capacitor
        uses: capacitor-actions/build@v1
        with:
          app-id: com.beki65.bulkmeter
          app-name: Bulk Meter
          web-dir: build
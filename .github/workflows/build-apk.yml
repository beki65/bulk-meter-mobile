name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        env:
          CI: false
          
      - name: Build React App
        run: npm run build
        env:
          CI: false
          
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
        # Skip the broken setup-android action, use built-in tools
          
      - name: Setup Capacitor
        run: |
          # Install Capacitor 5
          npm install @capacitor/cli@5 @capacitor/android@5 --legacy-peer-deps
          
          # Create capacitor config
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.beki65.bulkmeter",
            "appName": "Bulk Meter Test",
            "webDir": "build",
            "bundledWebRuntime": false
          }
          EOF
          
          # Add Android platform
          npx cap add android
          
          # Copy files
          npx cap copy android
          
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          # Use Java 17 for gradle
          export JAVA_HOME=$JAVA_HOME_17_X64
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Bulk-Meter-Test
          path: android/app/build/outputs/apk/debug/app-debug.apk
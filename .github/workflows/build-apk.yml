name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - run: npm ci
    - run: npm run build
      env:
        CI: false
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'  # Keep at 17
    - uses: android-actions/setup-android@v3
    - run: npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/camera @capacitor/geolocation
    - run: npx cap init "Bulk Meter" "com.bulkmeter.app" --web-dir=build
    - run: npx cap add android
    - run: npx cap sync
    - run: |
        cd android
        chmod +x gradlew
        # Set Java compatibility to 17
        echo "android.compileOptions.sourceCompatibility = JavaVersion.VERSION_17" >> app/build.gradle
        echo "android.compileOptions.targetCompatibility = JavaVersion.VERSION_17" >> app/build.gradle
        ./gradlew assembleDebug
    - uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
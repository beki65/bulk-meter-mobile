name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        env:
          CI: false
          
      - name: Build React App
        run: npm run build
        env:
          CI: false
          
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Setup Capacitor
        run: |
          # Remove any existing capacitor config
          rm -f capacitor.config.json
          
          # Create capacitor config
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.beki65.bulkmeter",
            "appName": "Bulk Meter Test",
            "webDir": "build",
            "bundledWebRuntime": false
          }
          EOF
          
          # Install Capacitor 5
          npm install @capacitor/cli@5 @capacitor/android@5 --legacy-peer-deps
          
          # Add Android platform
          npx cap add android
          
          # Copy files
          npx cap copy android
          
      - name: Fix Gradle for Java 17
        run: |
          cd android
          # Update gradle wrapper to use Java 17 compatible version
          sed -i 's/gradle-8.0.2-all.zip/gradle-7.6.4-all.zip/g' gradle/wrapper/gradle-wrapper.properties
          cat gradle/wrapper/gradle-wrapper.properties
          
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Bulk-Meter-Test
          path: android/app/build/outputs/apk/debug/app-debug.apk